name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas openpyxl

    - name: Syntax check
      run: |
        python -m py_compile stage1_ingest.py
        python -m py_compile stage2_generate.py
        python -m py_compile run_pipeline.py
        echo "All files syntax OK"

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short